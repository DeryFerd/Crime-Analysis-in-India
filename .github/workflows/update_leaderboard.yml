name: Auto Leaderboard

on:
  push:
    branches: [main]

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run leaderboard script
        run: python update_leaderboard.py

      - name: Commit & push changes
        run: |
          git config --global user.name "leaderboard-bot"
          git config --global user.email "bot@example.com"
          git add leaderboard.json README.md
          git commit -m "Update leaderboard" || echo "No changes"
          git push
